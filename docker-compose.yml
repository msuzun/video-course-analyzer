services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  api:
    image: python:${PYTHON_VERSION:-3.11}-slim
    working_dir: /app
    command: sh -c "pip install --default-timeout=1000 --retries 10 -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - redis
      - qdrant
    environment:
      DATA_ROOT: /data/jobs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      CHAT_MODEL: ${CHAT_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      CHAT_PROMPT_PATH: /shared/models/prompts/chat_answer.txt
    volumes:
      - ./apps/api:/app
      - ./data/jobs:/data/jobs
      - ./shared:/shared
    ports:
      - "8000:8000"

  worker-cpu:
    image: python:${PYTHON_VERSION:-3.11}-slim
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends ffmpeg tesseract-ocr && rm -rf /var/lib/apt/lists/* && pip install --upgrade pip setuptools==80.9.0 wheel && pip install --no-build-isolation -r requirements.txt && celery -A worker:celery_app worker --loglevel=info --pool=solo -Q cpu_pipeline"
    depends_on:
      - redis
      - qdrant
    environment:
      DATA_ROOT: /data/jobs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - ./apps/worker-cpu:/app
      - ./data/jobs:/data/jobs

  worker-gpu:
    image: python:${PYTHON_VERSION:-3.11}-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A worker:celery_app worker --loglevel=info --pool=solo -Q writer_llm"
    depends_on:
      - redis
      - qdrant
    environment:
      DATA_ROOT: /data/jobs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      WRITER_MODEL: ${WRITER_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      VIDEO_BRIEF_PROMPT_PATH: /shared/models/prompts/video_brief.txt
    volumes:
      - ./apps/worker-gpu:/app
      - ./data/jobs:/data/jobs
      - ./shared:/shared

  rag-indexer:
    image: python:${PYTHON_VERSION:-3.11}-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A indexer:celery_app worker --loglevel=info --pool=solo -Q rag_index"
    depends_on:
      - redis
      - qdrant
    environment:
      DATA_ROOT: /data/jobs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
    volumes:
      - ./apps/rag:/app
      - ./data/jobs:/data/jobs

