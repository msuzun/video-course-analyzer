services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage

  api:
    image: python:${PYTHON_VERSION:-3.11}-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - redis
      - qdrant
    environment:
      DATA_ROOT: /data/jobs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - ./apps/api:/app
      - ./data/jobs:/data/jobs
    ports:
      - "8000:8000"

  worker-cpu:
    image: python:${PYTHON_VERSION:-3.11}-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && celery -A worker:celery_app worker --loglevel=info --pool=solo"
    depends_on:
      - redis
      - qdrant
    environment:
      DATA_ROOT: /data/jobs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - ./apps/worker-cpu:/app
      - ./data/jobs:/data/jobs

  rag-indexer:
    image: python:${PYTHON_VERSION:-3.11}-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python -c 'import time; print(\"rag-indexer ready\"); time.sleep(3600)'"
    depends_on:
      - redis
      - qdrant
    environment:
      DATA_ROOT: /data/jobs
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    volumes:
      - ./apps/rag:/app
      - ./data/jobs:/data/jobs
